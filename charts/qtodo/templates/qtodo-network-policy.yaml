apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qtodo-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qtodo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Only allow inbound traffic from the OpenShift router (external user traffic via Route)
  - ports:
    - protocol: TCP
      port: 8080
    from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
  egress:
  # DNS resolution via CoreDNS — OCP uses port 5353 (not 53)
  - ports:
    - protocol: UDP
      port: 5353
    - protocol: TCP
      port: 5353
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
  # PostgreSQL — qtodo-db pod in the same namespace
  - ports:
    - protocol: TCP
      port: 5432
    to:
    - podSelector:
        matchLabels:
          app: qtodo-db
  # Vault API — SPIFFE JWT auth for DB credentials retrieval
  - ports:
    - protocol: TCP
      port: 8200
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault
  # Keycloak OIDC — external Route via OCP router (QUARKUS_OIDC_AUTH_SERVER_URL resolves to keycloak.apps.*)
  - ports:
    - protocol: TCP
      port: 443
    to:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
