apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qtodo-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qtodo
  policyTypes:
  - Egress
  egress:
  # DNS resolution (CoreDNS in openshift-dns namespace)
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
  # PostgreSQL to qtodo-db in same namespace
  - ports:
    - protocol: TCP
      port: 5432
    to:
    - podSelector:
        matchLabels:
          app: qtodo-db
  # Vault API (SPIFFE JWT auth for DB credentials)
  - ports:
    - protocol: TCP
      port: 8200
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault
  # Keycloak OIDC (when OIDC is enabled with SPIRE)
  - ports:
    - protocol: TCP
      port: 8443
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: keycloak-system
