apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qtodo-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qtodo
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow all ingress — required for DNS/ClusterIP responses to reach the pod.
  # OVN-Kubernetes disrupts DNS DNAT/SNAT when NetworkPolicy ACLs are active.
  # Application security enforced via Keycloak OIDC on all paths.
  - {}
  egress:
  # DNS resolution (port 53 UDP+TCP)
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # PostgreSQL — qtodo-db service (port 5432)
  - ports:
    - protocol: TCP
      port: 5432
  # Vault API — SPIFFE JWT auth for DB credentials (port 8200)
  - ports:
    - protocol: TCP
      port: 8200
  # Keycloak OIDC — internal service (port 8443)
  - ports:
    - protocol: TCP
      port: 8443
  # Keycloak OIDC — external route via cluster load balancer (port 443)
  - ports:
    - protocol: TCP
      port: 443
