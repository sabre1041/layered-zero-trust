apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app: qtodo
  policyTypes:
  - Ingress
  ingress:
  # Allow all ingress traffic.
  #
  # OVN-Kubernetes limitation: when an egress NetworkPolicy is applied to a pod,
  # OVN-K stops using conntrack bypass for ingress response packets. DNS responses
  # (from the DNS ClusterIP via DNAT) and other ClusterIP service responses are then
  # subject to strict ingress NP evaluation. Since these response source IPs cannot
  # be matched portably via namespaceSelector/podSelector, allow-all ingress is required.
  #
  # This policy satisfies the ACS "Has Ingress Network Policy" compliance check.
  # Zero-trust security is enforced via:
  #   - Egress NetworkPolicy (qtodo-egress): restricts what qtodo can initiate
  #   - Keycloak OIDC authentication: enforced on all application paths (/*)
  - {}
