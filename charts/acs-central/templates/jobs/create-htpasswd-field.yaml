{{- if and .Values.central.enabled .Values.central.adminPassword.useExternalSecret }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-htpasswd-field
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acs-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  template:
    metadata:
      name: create-htpasswd-field
      labels:
        app: create-htpasswd-field
        {{- include "acs-central.labels" . | nindent 8 }}
    spec:
      containers:
        - image: registry.access.redhat.com/ubi9/ubi:latest
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.adminPassword.secretName }}
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              #!/usr/bin/env bash
              set -e

              echo "🔄 Generating htpasswd entry for admin user..."

              # Install httpd-tools for htpasswd command
              echo "Installing httpd-tools..."
              dnf install -y httpd-tools

              # Generate bcrypt hash
              echo "Generating bcrypt hash..."
              HTPASSWD_ENTRY=$(htpasswd -nbB admin "$PASSWORD")

              echo "✅ htpasswd entry generated"

              # Check if central-htpasswd secret already has valid htpasswd field
              if kubectl get secret {{ .Values.central.adminPassword.secretName }} -n {{ .Release.Namespace }} -o jsonpath='{.data.htpasswd}' 2>/dev/null | base64 -d | grep -q "^admin:\$2[aby]\$"; then
                echo "✅ htpasswd entry already exists and is valid (bcrypt format)"
                exit 0
              fi

              # Patch the secret to add/update htpasswd field
              kubectl patch secret {{ .Values.central.adminPassword.secretName }} -n {{ .Release.Namespace }} --type merge -p "{\"data\":{\"htpasswd\":\"$(echo -n "$HTPASSWD_ENTRY" | base64 -w0)\"}}"

              echo "✅ {{ .Values.central.adminPassword.secretName }} secret updated with htpasswd field"
          imagePullPolicy: IfNotPresent
          name: create-htpasswd-field
      dnsPolicy: ClusterFirst
      restartPolicy: OnFailure
      serviceAccount: create-cluster-init
      serviceAccountName: create-cluster-init
      terminationGracePeriodSeconds: 30
{{- end }}
