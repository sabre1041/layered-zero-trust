{{- if and .Values.central.enabled .Values.integration.keycloak.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-auth-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acs-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  template:
    metadata:
      name: create-auth-provider
    spec:
      containers:
        - image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.adminPassword.secretName }}
                  key: {{ .Values.central.adminPassword.secretKey }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.integration.keycloak.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.integration.keycloak.clientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.integration.keycloak.clientSecret.secretName }}
                  key: {{ .Values.integration.keycloak.clientSecret.secretKey }}
            - name: KEYCLOAK_ISSUER
              value: "https://keycloak.apps.{{ .Values.global.localClusterDomain }}/realms/{{ .Values.integration.keycloak.realm }}"
          command:
            - /bin/bash
            - -c
            - |
              #!/usr/bin/env bash

              echo "🔄 Configuring Keycloak OIDC authentication provider..."

              # Wait for ACS Central to be ready
              echo "⏳ Waiting for ACS Central API to be available..."
              max_retries=30
              retry_count=0
              until curl -sk -u "admin:$PASSWORD" https://central/v1/ping > /dev/null 2>&1; do
                retry_count=$((retry_count + 1))
                if [ $retry_count -ge $max_retries ]; then
                  echo "❌ Timeout waiting for ACS Central API"
                  exit 1
                fi
                echo "  Retry $retry_count/$max_retries..."
                sleep 10
              done
              echo "✅ ACS Central API is ready"

              # Check if auth provider already exists
              AUTH_PROVIDERS=$(curl -sk -u "admin:$PASSWORD" https://central/v1/authProviders)
              if echo "$AUTH_PROVIDERS" | grep -q "Keycloak OIDC"; then
                echo "✅ Keycloak OIDC provider already configured"
                exit 0
              fi

              # Get ACS Central external URL
              ACS_CENTRAL_URL="https://$(oc get route central -n stackrox -o jsonpath='{.spec.host}')"
              echo "ACS Central URL: $ACS_CENTRAL_URL"

              # Create Keycloak OIDC provider
              cat > /tmp/oidc-config.json <<EOF
              {
                "name": "Keycloak OIDC",
                "type": "oidc",
                "enabled": true,
                "uiEndpoint": "$ACS_CENTRAL_URL",
                "config": {
                  "issuer": "$KEYCLOAK_ISSUER",
                  "client_id": "$KEYCLOAK_CLIENT_ID",
                  "client_secret": "$KEYCLOAK_CLIENT_SECRET",
                  "mode": "auto"
                },
                "claimMappings": {
                  "name": "preferred_username",
                  "email": "email",
                  "groups": "groups"
                }
              }
              EOF

              curl -X POST -u "admin:$PASSWORD" -k https://central/v1/authProviders \
                -H "Content-Type: application/json" \
                --data @/tmp/oidc-config.json \
                > /tmp/output.json

              if [ $? -ne 0 ]; then
                echo "❌ Failed to create auth provider"
                cat /tmp/output.json
                exit 1
              fi

              # Extract provider ID
              AUTH_PROVIDER_ID=$(sed 's/,/\n/g' /tmp/output.json | grep -w id | awk -F\" '{ print $4 }')

              if [ -z "$AUTH_PROVIDER_ID" ]; then
                echo "❌ Failed to extract auth provider ID"
                cat /tmp/output.json
                exit 1
              fi

              echo "✅ Auth provider created with ID: $AUTH_PROVIDER_ID"

              # Create admin role mapping for acs-admin role
              JSON_PAYLOAD="{\"roleName\":\"Admin\",\"props\":{\"authProviderId\":\"$AUTH_PROVIDER_ID\",\"key\":\"roles\",\"value\":\"acs-admin\"}}"

              curl -X POST -u "admin:$PASSWORD" -k https://central/v1/groups \
                -H "Content-Type: application/json" \
                -s --data "$JSON_PAYLOAD"

              if [ $? -eq 0 ]; then
                echo "✅ Admin role mapping created for acs-admin"
              else
                echo "⚠️  Warning: Failed to create admin role mapping (may already exist)"
              fi

              echo "🎉 Keycloak OIDC configuration complete"
          imagePullPolicy: Always
          name: create-auth-provider
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccount: create-cluster-init
      serviceAccountName: create-cluster-init
      terminationGracePeriodSeconds: 30
{{- end }}