{{- if and .Values.central.enabled .Values.integration.keycloak.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: create-auth-provider
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acs-central.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "13"
spec:
  template:
    metadata:
      name: create-auth-provider
    spec:
      containers:
        - image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
          env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.central.adminPassword.secretName }}
                  key: {{ .Values.central.adminPassword.secretKey }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.integration.keycloak.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.integration.keycloak.clientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.integration.keycloak.clientSecret.secretName }}
                  key: {{ .Values.integration.keycloak.clientSecret.secretKey }}
            - name: KEYCLOAK_ISSUER
              value: "https://keycloak.{{ .Values.global.localClusterDomain }}/realms/{{ .Values.integration.keycloak.realm }}"
          command:
            - /bin/bash
            - -c
            - |
              #!/usr/bin/env bash

              echo "đź”„ Configuring Keycloak OIDC authentication provider..."

              # Wait for ACS Central to be ready
              echo "âŹł Waiting for ACS Central API to be available..."
              max_retries=30
              retry_count=0
              until curl -sk -u "admin:$PASSWORD" https://central/v1/ping > /dev/null 2>&1; do
                retry_count=$((retry_count + 1))
                if [ $retry_count -ge $max_retries ]; then
                  echo "âťŚ Timeout waiting for ACS Central API"
                  exit 1
                fi
                echo "  Retry $retry_count/$max_retries..."
                sleep 10
              done
              echo "âś… ACS Central API is ready"

              # Wait for Keycloak OIDC discovery endpoint to be available
              echo "âŹł Waiting for Keycloak OIDC discovery endpoint..."
              max_retries=30
              retry_count=0
              until curl -sk "$KEYCLOAK_ISSUER/.well-known/openid-configuration" > /dev/null 2>&1; do
                retry_count=$((retry_count + 1))
                if [ $retry_count -ge $max_retries ]; then
                  echo "âťŚ Timeout waiting for Keycloak OIDC discovery endpoint"
                  echo "   Tried: $KEYCLOAK_ISSUER/.well-known/openid-configuration"
                  exit 1
                fi
                echo "  Retry $retry_count/$max_retries..."
                sleep 10
              done
              echo "âś… Keycloak OIDC discovery endpoint is ready"

              # Check if auth provider already exists
              AUTH_PROVIDERS=$(curl -sk -u "admin:$PASSWORD" https://central/v1/authProviders)
              if echo "$AUTH_PROVIDERS" | grep -q "Keycloak OIDC"; then
                echo "âś… Keycloak OIDC provider already configured"
                exit 0
              fi

              # Get ACS Central hostname (without https://)
              ACS_CENTRAL_HOSTNAME="$(oc get route central -n stackrox -o jsonpath='{.spec.host}')"
              echo "ACS Central hostname: $ACS_CENTRAL_HOSTNAME"

              # Create Keycloak OIDC provider JSON
              cat > /tmp/oidc-config.json << 'OIDCEOF'
              {
                "name": "Keycloak OIDC",
                "type": "oidc",
                "enabled": true,
                "uiEndpoint": "UI_ENDPOINT_PLACEHOLDER",
                "config": {
                  "issuer": "ISSUER_PLACEHOLDER",
                  "client_id": "CLIENT_ID_PLACEHOLDER",
                  "client_secret": "CLIENT_SECRET_PLACEHOLDER",
                  "mode": "query"
                },
                "claimMappings": {
                  "name": "preferred_username",
                  "email": "email",
                  "groups": "groups"
                }
              }
              OIDCEOF

              # Remove leading spaces from JSON
              sed -i 's/^              //g' /tmp/oidc-config.json

              # Replace placeholders
              sed -i "s|UI_ENDPOINT_PLACEHOLDER|$ACS_CENTRAL_HOSTNAME|g" /tmp/oidc-config.json
              sed -i "s|ISSUER_PLACEHOLDER|$KEYCLOAK_ISSUER|g" /tmp/oidc-config.json
              sed -i "s|CLIENT_ID_PLACEHOLDER|$KEYCLOAK_CLIENT_ID|g" /tmp/oidc-config.json
              sed -i "s|CLIENT_SECRET_PLACEHOLDER|$KEYCLOAK_CLIENT_SECRET|g" /tmp/oidc-config.json

              # Debug: Show the JSON payload
              echo "đź“ť OIDC Configuration JSON:"
              cat /tmp/oidc-config.json
              echo ""

              # Verify Keycloak discovery endpoint one more time before creating provider
              echo "đź”Ť Verifying Keycloak discovery endpoint..."
              curl -sk "$KEYCLOAK_ISSUER/.well-known/openid-configuration" | head -20
              echo ""

              echo "đź“¤ Creating auth provider in ACS..."
              HTTP_CODE=$(curl -X POST -u "admin:$PASSWORD" -k https://central/v1/authProviders \
                -H "Content-Type: application/json" \
                --data @/tmp/oidc-config.json \
                -w "%{http_code}" \
                -o /tmp/output.json)

              echo "đź“Ą Response HTTP Code: $HTTP_CODE"
              echo "đź“Ą Response Body:"
              cat /tmp/output.json
              echo ""

              if [ "$HTTP_CODE" != "200" ]; then
                echo "âťŚ Failed to create auth provider (HTTP $HTTP_CODE)"
                exit 1
              fi

              # Extract provider ID
              AUTH_PROVIDER_ID=$(sed 's/,/\n/g' /tmp/output.json | grep -w id | awk -F\" '{ print $4 }')

              if [ -z "$AUTH_PROVIDER_ID" ]; then
                echo "âťŚ Failed to extract auth provider ID"
                cat /tmp/output.json
                exit 1
              fi

              echo "âś… Auth provider created with ID: $AUTH_PROVIDER_ID"

              # Create admin role mapping for acs-admin role
              echo "đź“ť Creating role mapping: acs-admin â†’ Admin"
              JSON_PAYLOAD="{\"roleName\":\"Admin\",\"props\":{\"authProviderId\":\"$AUTH_PROVIDER_ID\",\"key\":\"roles\",\"value\":\"acs-admin\"}}"

              HTTP_CODE=$(curl -X POST -u "admin:$PASSWORD" -k https://central/v1/groups \
                -H "Content-Type: application/json" \
                --data "$JSON_PAYLOAD" \
                -w "%{http_code}" \
                -o /tmp/role-mapping.json)

              echo "đź“Ą Role mapping response (HTTP $HTTP_CODE):"
              cat /tmp/role-mapping.json
              echo ""

              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
                echo "âś… Admin role mapping created for acs-admin"
              else
                echo "âš ď¸Ź  Warning: Failed to create admin role mapping (HTTP $HTTP_CODE, may already exist)"
              fi

              echo "đźŽ‰ Keycloak OIDC configuration complete"
          imagePullPolicy: Always
          name: create-auth-provider
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccount: create-cluster-init
      serviceAccountName: create-cluster-init
      terminationGracePeriodSeconds: 30
{{- end }}